# Change prefix to Ctrl-a
unbind-key C-b
set -g prefix C-a
bind-key C-a send-prefix

# Reload tmux config with r
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Enable vim bindings
set-window-option -g mode-keys vi

# Disable delay switching modes
set -s escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Enable modern terminal features
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Undercurl support
set -ga terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -ga terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Set default shell
set -g default-shell /bin/zsh

# Enable focus events
set -g focus-events on

# Set terminal titleo
set -g set-titles on

# Better pane splitting
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Resize panes with vim movements
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Maximize pane with m
bind -r m resize-pane -Z

# Enable the mouse
set -g mouse on

# Don't exit copy mode when selecting with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Style configuration
# Themed for https://github.com/thesimonho/kanagawa-paper.nvim
set -g status-position top
set -g status-interval 1
set -g status-left-length 80
set -g status-style "bg=#1f1f28"
set -g status-left "#{?client_prefix,#[bg=#c4746e],#[bg=#c4b28a]}#{?client_prefix,#[fg=#1f1f28],#[fg=#16161d]}  #{session_name} #{?client_prefix,#[fg=#c4746e],#[fg=#c4b28a]}#[bg=#1f1f28]"
set -g status-right "#[fg=#363646,bg=#1f1f28]#[fg=#c4b28a,bg=#363646] %H:%M #[fg=#1f1f28,bg=#363646]#[fg=#c4b28a,bg=#1f1f28]#[fg=#16161d,bg=#c4b28a] %b %d "
set -g window-status-current-format '#[fg=#1f1f28,bg=#363646]#[fg=#c4b28a,bg=#363646] #[bold]#{window_index}:#{window_name}#[nobold] #[fg=#363646,bg=#1f1f28]'
set -g window-status-format "#[fg=#1f1f28,bg=#2a2a37]#[fg=#9e9b93,bg=#2a2a37] #{window_index}:#{window_name} #[fg=#2a2a37,bg=#1f1f28]"
set -g window-status-separator ""
set -g message-style "fg=#dcd7ba,bg=#1f1f28"
set -g mode-style "fg=#1f1f28,bg=#938aa9"
set -g pane-border-status top
set -g pane-border-style "fg=#8992a7"
set -g pane-active-border-style "fg=#dcd7ba"
set -g pane-border-format "(#{pane_index}) #{pane_current_command}"
